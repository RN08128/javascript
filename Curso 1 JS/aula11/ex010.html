<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Você foi multado!?</title>
</head>
<body>
    <h1>Sistema de multas</h1>
    Velocidade do carro: <input type="number" name="vel" id="vel">
    <input type="submit" value="Enviar" onclick="calcular()">
    <div id="velof">...</div>
    <script>
        function calcular() {
        var velocidade = document.getElementById('vel')
            var v1 = Number(velocidade.value)

            var vf = document.getElementById('velof')

        if (v1 <= 60){
            vf.innerHTML = (`Você estava a <Strong>${v1} km/h</strong> e NÃO foi multado`)
        } else{
            vf.innerHTML = (`Você estava a <Strong>${v1} km/h</Strong> e FOI multado`)
        }
        }
    </script>
</body>
</html>
