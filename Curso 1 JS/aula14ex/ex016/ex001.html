<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="ex001.css">
</head>
<body>
    <header>
        <h1>Vamos contar</h1>
    </header>
    <section id="content">
        <div id="interior">
            <p>
                <label for="ini">Início:</label>
                <input type="number" name="ini" id="ini">
            </p>
            <p>
                <label for="fim">Fim:</label>
                <input type="number" name="fim" id="fim">
            </p>
            <p>
                <label for="pas">Passo:</label>
                <input type="number" name="pas" id="pas">
            </p>
            <input type="submit" value="Contar" onclick="contar()">
        </div>
        <div id="msg"></div>
        <div id="contagem"><br></div>
    </section>
    <script src="script.js"></script>
</body>
</html>
