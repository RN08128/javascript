<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My first program</title>
    <style>
        body{
            background-color: lightblue;
            color: whitesmoke;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 22px;
        }
        h1{
            color: lightyellow;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição</p>
    <script>
        var n1 = Number(window.prompt('Digite um número')) //recebendo string
        var n2 = Number(window.prompt('Digite outro número')) //recebendo string
        var s = n1 + n2
        window.alert(`A soma dos valores (${n1}) e (${n2}) é  ${s}`)
    </script>
</body>
</html>
