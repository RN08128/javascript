<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My first program</title>
    <style>
        body{
            background-color: lightblue;
            color: whitesmoke;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 22px;
        }
        h1{
            color: lightyellow;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição</p>
    <script>
        var nome = window.prompt('Qual é seu nome?')
        var idade = window.prompt('Qual a sua idade?')
        var salario = window.prompt('Digite o valor do seu salário:')
        window.alert('Nome:'+ nome)
        window.alert('Idade:'+ idade)
        window.alert('Salário:'+ salario)
    </script>
</body>
</html>
